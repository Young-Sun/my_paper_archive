site_name: Paper Archive
site_description: AI-powered paper analysis
theme:
  name: material
  language: ko
  palette:
  - scheme: default
    primary: indigo
    accent: deep purple
    toggle:
      icon: material/brightness-7
      name: Dark mode
  - scheme: slate
    primary: indigo
    accent: deep purple
    toggle:
      icon: material/brightness-4
      name: Light mode
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
  - navigation.instant
  - navigation.tracking
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  - toc.follow
plugins:
- search:
    lang:
    - ko
    - en
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
- toc:
    permalink: true
- attr_list
- md_in_html
- tables
nav:
- Home: index.md
- Papers:
  - Attention Is All You Need: archived/attention.md
