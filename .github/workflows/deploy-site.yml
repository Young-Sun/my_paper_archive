name: Deploy Website

on:
  push:
    paths:
      - "docs/archived/**"
      - "docs/index.md"
      - "mkdocs.yml"
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install & generate nav
        run: |
          pip install mkdocs-material pyyaml
          python scripts/generate_nav.py

      - name: Commit nav update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mkdocs.yml
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Update nav"
            git push
          fi

      - name: Deploy MkDocs
        run: mkdocs gh-deploy --force
