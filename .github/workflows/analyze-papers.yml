name: Analyze Papers

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-analysis"
        type: boolean
        default: false
      tier:
        description: "Model tier"
        type: choice
        options:
          - free
          - pro
        default: pro

  push:
    paths:
      - "inputs/**"
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install anthropic PyMuPDF pyyaml

      - name: Analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY not set"
            exit 1
          fi
          echo "API key length: ${#ANTHROPIC_API_KEY} chars"

          TIER="${{ github.event.inputs.tier || 'pro' }}"
          ARGS="--input inputs/paper_links.txt --tier $TIER"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/analyze_papers.py $ARGS

      - name: Commit analysis results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/papers/ results/ inputs/pdfs/
          if git diff --cached --quiet; then
            echo "No new analysis results"
          else
            TS=$(date -u +"%Y-%m-%d %H:%M UTC")
            COUNT=$(git diff --cached --name-only | grep "docs/papers/.*\.md$" | wc -l)
            git commit -m "📄 ${COUNT} paper(s) analyzed - $TS"
            git push
          fi
