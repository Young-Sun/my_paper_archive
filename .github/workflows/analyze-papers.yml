name: Analyze Papers & Deploy

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-analysis"
        type: boolean
        default: false
      tier:
        description: "Model tier"
        type: choice
        options:
          - free
          - pro
        default: free

  push:
    paths:
      - "inputs/**"
    branches:
      - main

# ============================================================
# SECURITY: fork PR에서는 이 워크플로우가 실행되지 않습니다.
# - 트리거가 push(main) + workflow_dispatch만 있어서
#   pull_request 이벤트가 아예 없음
# - pull_request_target도 사용하지 않음
# ============================================================

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    # SECURITY: fork에서 실행 차단 (이중 안전장치)
    if: github.repository_owner == github.actor || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install anthropic openpyxl PyMuPDF mkdocs-material pyyaml

      - name: Analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # SECURITY: API key 존재 확인 (값은 출력하지 않음)
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY not set"
            exit 1
          fi
          echo "API key length: ${#ANTHROPIC_API_KEY} chars"

          TIER="${{ github.event.inputs.tier || 'free' }}"
          ARGS="--input inputs/paper_links.txt --tier $TIER"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/analyze_papers.py $ARGS

      - name: Generate nav
        run: python scripts/generate_nav.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ results/ inputs/pdfs/ mkdocs.yml
          if git diff --cached --quiet; then
            echo "No changes"
          else
            TS=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Analyzed papers - $TS"
            git push
          fi

  deploy:
    needs: analyze
    runs-on: ubuntu-latest

    # SECURITY: fork 차단
    if: github.repository_owner == github.actor || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Deploy MkDocs
        run: |
          pip install mkdocs-material
          mkdocs gh-deploy --force
